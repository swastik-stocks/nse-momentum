name: NSE Momentum - 10am Confirmation

on:
  schedule:
    - cron: '30 4 * * 1-5'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  confirm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install python-dotenv requests yfinance loguru
          pip install git+https://github.com/rongardF/tvdatafeed.git || echo "tvDatafeed install failed - RVOL will use yfinance fallback"

      - name: Find latest successful scan run
        id: find_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          run_id=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/daily_scan.yml/runs?status=success&per_page=1" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['workflow_runs'][0]['id'])")
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "Using scan run: $run_id"

      - name: Download picks artifact
        uses: actions/download-artifact@v4
        with:
          name: picks_latest
          path: .
          run-id: ${{ steps.find_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run confirmation checker
        env:
          DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
          DHAN_CLIENT_ID: ${{ secrets.DHAN_CLIENT_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PICKS_JSON_PATH: picks_latest.json
        run: python confirm_picks.py