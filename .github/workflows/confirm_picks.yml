name: NSE Momentum - 10am Confirmation

on:
  schedule:
    - cron: '30 4 * * 1-5'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  confirm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install python-dotenv

      - name: Download picks artifact
        uses: actions/download-artifact@v4
        with:
          name: picks_latest
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Run confirmation checker
        env:
          DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
          DHAN_CLIENT_ID: ${{ secrets.DHAN_CLIENT_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PICKS_JSON_PATH: picks_latest.json
        run: python confirm_picks.py
