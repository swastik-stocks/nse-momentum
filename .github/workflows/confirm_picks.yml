name: NSE Momentum - 10am Confirmation

on:
  schedule:
    # 10:00 AM IST = 04:30 UTC
    - cron: '30 4 * * 1-5'
  workflow_dispatch:    # ← manual trigger for testing

jobs:
  confirm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      # Download the picks JSON saved by last night's evening scan
      - name: Download picks artifact from latest scan run
        uses: dawidd6/action-download-artifact@v6
        with:
          name: picks_latest
          path: .
          workflow: scan.yml          # ← name of your evening scan workflow file
          workflow_conclusion: success

      - name: Run confirmation checker
       env:
          DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
          DHAN_CLIENT_ID:    ${{ secrets.DHAN_CLIENT_ID }}
          GMAIL_ADDRESS:     ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:${{ secrets.GMAIL_APP_PASSWORD }}
          PICKS_JSON_PATH:   picks_latest.json
        run: python confirm_picks.py
