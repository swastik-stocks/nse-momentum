name: NSE Momentum Daily Scan

on:
  schedule:
    # 7:30 PM IST = 14:00 UTC (IST is UTC+5:30)
    # Runs Mon-Fri only. Bhavcopy is available by 6 PM IST.
    - cron: '0 14 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install git+https://github.com/rongardF/tvdatafeed.git || echo "tvDatafeed install failed - RVOL will use yfinance fallback"
          pip install pandas-ta --no-deps || echo "pandas-ta install failed - using manual calculations"

      - name: Run NSE Momentum Scanner v5.3
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scanner.py

      - name: Upload scan log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-log-${{ github.run_number }}
          path: logs/
          retention-days: 7

      - name: Upload picks for confirmation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: picks_latest
          path: picks_latest.json
          retention-days: 2
